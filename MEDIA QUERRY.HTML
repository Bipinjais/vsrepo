<!doctype html>
<html >
<head>
   
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .grid-container{
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            padding: 20px;
        }

        .box{
            height: 100px;
            background-color: royalblue;
            color: white;
            display: flex;
           
        }
        @media (max-width: 768px){
            .grid-container{
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 576px){
            .grid-container{
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>

    <div class="grid-container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
        <div class="box">9</div>
        <div class="box">10</div>
        <div class="box">11</div>
        <div class="box">12</div>
    </div>

</body>
</html>
