<!doctype html>
<html>
<head>

<style>

.container{
    display:grid;
    gap:10px;
    grid-template-columns:repeat(4,1fr);
}

.box{
    padding:20px;
    background:aqua;
    text-align:center;
    font-size:24px;
}



#box-1{
    grid-column:1/5;
}

#box-2{
    grid-row:2/4;
    height:500px;
}

#box-3{
    grid-column:2;
    grid-row:2;
}

#box-4{
    grid-column:3;
    grid-row:2;
}

#box-5{
    grid-column:2;
    grid-row:3;
}

#box-6{
    grid-column:3;
    grid-row:3;
}

#box-7{
    grid-column:4;
    grid-row:2/4;
    height:500px;
}

#box-8{
    grid-column:1/5;
}


@media (min-width:768px) and (max-width:991px){

    .container{
        grid-template-columns:repeat(3,1fr);
    }

    #box-1{
        grid-column:1/4;
        grid-row:1;
    }

    #box-2{
        grid-column:1;
        grid-row:2/4;
        height:auto;
    }

    #box-3{
        grid-column:2;
        grid-row:2;
    }

    #box-4{
        grid-column:3;
        grid-row:2;
    }

    #box-5{
        grid-column:2;
        grid-row:3;
    }

    #box-6{
        grid-column:3;
        grid-row:3;
    }

    #box-7{
        grid-column:1/4;
        grid-row:4;
        height:auto;
    }

    #box-8{
        grid-column:1/4;
        grid-row:5;
    }
}



@media (min-width:576px) and (max-width:767px){

    .container{
        grid-template-columns:repeat(2,1fr);
    }

    #box-1{
        grid-column:1/3;
        grid-row:1;
    }

    #box-2{
        grid-column:1;
        grid-row:2/4;
        height:auto;
    }

    #box-3{
        grid-column:2;
        grid-row:2;
    }

    #box-4{
        grid-column:2;
        grid-row:3;
    }

    #box-5{
        grid-column:1;
        grid-row:4;
    }

    #box-6{
        grid-column:2;
        grid-row:4;
    }

    #box-7{
        grid-column:1/3;
        grid-row:5;
        height:auto;
    }

    #box-8{
        grid-column:1/3;
        grid-row:6;
    }
}



@media (max-width:575px){

    .container{
        grid-template-columns:1fr;
    }

    .box{
        grid-column:auto !important;
        grid-row:auto !important;
        height:auto !important;
    }
}

</style>
</head>

<body>

<div class="container">
    <div class="box" id="box-1">1</div>
    <div class="box" id="box-2">2</div>
    <div class="box" id="box-3">3</div>
    <div class="box" id="box-4">4</div>
    <div class="box" id="box-5">5</div>
    <div class="box" id="box-6">6</div>
    <div class="box" id="box-7">7</div>
    <div class="box" id="box-8">8</div>
</div>

</body>
</html>
